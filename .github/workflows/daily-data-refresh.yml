name: Daily Data Refresh (Scheduler)

on:
  schedule:
    # 11:00 AM IST = 5:30 AM UTC (IST is UTC+5:30)
    - cron: "30 5 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  data-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Create .env (Groq API key)
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      - name: Run scheduler (one-time ingestion)
        run: python -m scheduler.run_once

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-logs-${{ github.run_id }}
          path: logs/scheduler.log
          retention-days: 30

      - name: Upload last_updated.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: last-updated-${{ github.run_id }}
          path: data/last_updated.json
          retention-days: 30

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/ data/chroma/ data/last_updated.json
          git add -f logs/scheduler.log || true
          git diff --cached --quiet || git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
